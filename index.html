<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>English Dictionary</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2 class="heading">Dictionary</h2>
    <input class="input" type="text" placeholder="Search a word">
    <p class="info">Type a word and press enter</p>
    <div class="meaning-container">
      <p>Word Title: <span class="title">____</span></p>
      <p>Meaning: <span class="meaning">____</span></p>
      <audio src="" controls class="control"></audio>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
